name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

# Project Node version is pinned via .nvmrc (Node 24 LTS).

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: ESLint
        run: npm run lint:js
      - name: Stylelint
        run: npm run lint:css
      - name: Markdownlint
        run: npm run lint:md
      - name: Prettier
        run: npx prettier --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build + run tests
        run: npm test

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
