name: CI

# NOTE: Auto-triggers (push / pull_request) are disabled while the starter
# consumes `@eleventy-plugin-themer/*` via local `file://` paths — those don't
# resolve on a hosted runner, so every job fails at `npm install` /
# `import/no-unresolved`. Once the plugin is published to npm and the
# starter's package.json switches to semver ranges, uncomment the push /
# pull_request triggers below to re-enable. The job definitions are kept
# deliberately complete so re-enabling is a one-line edit.
#
# In the meantime, the workflow can still be run manually from the Actions
# tab via the "Run workflow" button (workflow_dispatch).

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: ESLint
        run: npm run lint:js
      - name: Stylelint
        run: npm run lint:css
      - name: Markdownlint
        run: npm run lint:md
      - name: Prettier
        run: npx prettier --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build + run tests
        run: npm test

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
