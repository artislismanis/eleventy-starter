name: CI

# NOTE: This workflow is currently expected to FAIL on `npm install` because
# the starter consumes `@eleventy-plugin-themer/*` packages via local file://
# paths during pre-release development. Once the plugin publishes to npm and
# the starter's package.json is switched to semver ranges, this workflow will
# light up. The job definitions below are deliberately complete so the switch
# is a one-line edit.

on:
  push:
    branches: [feature/simplify-with-theme-structure, main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: ESLint
        run: npm run lint:js
      - name: Stylelint
        run: npm run lint:css
      - name: Markdownlint
        run: npm run lint:md
      - name: Prettier
        run: npx prettier --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build + run tests
        run: npm test

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
