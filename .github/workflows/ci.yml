name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

# Opt action JS runtimes into Node 24 ahead of the June 2026 default flip.
# Project Node version (under setup-node) stays at 22 (current LTS).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: ESLint
        run: npm run lint:js
      - name: Stylelint
        run: npm run lint:css
      - name: Markdownlint
        run: npm run lint:md
      - name: Prettier
        run: npx prettier --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build + run tests
        run: npm test

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
